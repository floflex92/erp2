name: Keep Netlify & Supabase Alive

on:
  schedule:
    - cron: '0 */3 * * *' # toutes les 3 heures
    - cron: '30 * * * *'  # à chaque demi-heure pour variation
  push:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    name: Ping & Keep-Alive
    steps:
      - name: Ping Netlify site
        run: |
          echo "🚀 Pinging Netlify: https://nexora-truck.fr"
          curl -fsS --max-time 30 "https://nexora-truck.fr" \
            -H "User-Agent: GitHub-Actions-Keepalive" \
            && echo "✅ Netlify OK" || (echo "❌ Netlify ping failed"; exit 1)

      - name: Ping Supabase
        run: |
          echo "🚀 Pinging Supabase: https://rnbbxmdughpxovcnhrpz.supabase.co"
          curl -fsS --max-time 30 "https://rnbbxmdughpxovcnhrpz.supabase.co" \
            -H "User-Agent: GitHub-Actions-Keepalive" \
            && echo "✅ Supabase OK" || (echo "❌ Supabase ping failed"; exit 1)

      - name: Log summary
        if: always()
        run: |
          echo "=== Keep-Alive Summary ==="
          echo "Timestamp: $(date -u)"
          echo "Netlify: https://nexora-truck.fr"
          echo "Supabase: https://rnbbxmdughpxovcnhrpz.supabase.co"
