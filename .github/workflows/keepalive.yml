name: Keep Netlify & Supabase Alive

on:
  schedule:
    - cron: '0 6 */3 * *' # tous les 3 jours a 06:00 UTC
  push:
    branches: [main, master, dev]
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    name: Ping & Keep-Alive
    steps:
      - name: Ping Netlify site
        run: |
          echo "Ping Netlify: https://nexora-truck.fr"
          curl -k -fsS --retry 3 --retry-all-errors --retry-delay 10 --max-time 30 "https://nexora-truck.fr" \
            -H "User-Agent: GitHub-Actions-Keepalive" \
            && echo "Netlify OK" || (echo "Netlify ping failed"; exit 1)

      - name: Ping Supabase
        env:
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secret VITE_SUPABASE_ANON_KEY absent: ping REST non authentifie"
            rest_status=$(curl -sS --retry 3 --retry-all-errors --retry-delay 10 -o /dev/null -w "%{http_code}" --max-time 30 "https://rnbbxmdughpxovcnhrpz.supabase.co/rest/v1/" \
              -H "User-Agent: GitHub-Actions-Keepalive")
            if [ "$rest_status" != "401" ] && [ "$rest_status" != "200" ]; then
              echo "Supabase REST ping failed avec statut HTTP $rest_status"
              exit 1
            fi
            echo "Supabase REST joignable avec statut HTTP $rest_status"
          else
            echo "Ping Supabase REST: https://rnbbxmdughpxovcnhrpz.supabase.co/rest/v1/"
            curl -fsS --retry 3 --retry-all-errors --retry-delay 10 --max-time 30 "https://rnbbxmdughpxovcnhrpz.supabase.co/rest/v1/" \
              -H "apikey: $SUPABASE_ANON_KEY" \
              -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
              -H "User-Agent: GitHub-Actions-Keepalive" \
              && echo "Supabase REST OK" || (echo "Supabase REST ping failed"; exit 1)
          fi

          echo "Ping Supabase Storage: https://rnbbxmdughpxovcnhrpz.supabase.co/storage/v1/status"
          curl -fsS --retry 3 --retry-all-errors --retry-delay 10 --max-time 30 "https://rnbbxmdughpxovcnhrpz.supabase.co/storage/v1/status" \
            -H "User-Agent: GitHub-Actions-Keepalive" \
            && echo "Supabase Storage OK" || (echo "Supabase Storage ping failed"; exit 1)

      - name: Log summary
        if: always()
        run: |
          echo "=== Keep-Alive Summary ==="
          echo "Timestamp: $(date -u)"
          echo "Netlify: https://nexora-truck.fr"
          echo "Supabase REST: https://rnbbxmdughpxovcnhrpz.supabase.co/rest/v1/"
          echo "Supabase Storage: https://rnbbxmdughpxovcnhrpz.supabase.co/storage/v1/status"
