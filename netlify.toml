[build]
  command = "npm run build"
  publish = "dist"

[dev]
  framework = "#custom"
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[build.environment]
  NODE_VERSION = "20"
  VITE_APP_VERSION = "1.15.20"
  # Ollama n'est pas accessible depuis Netlify en production (service local).
  # Ces valeurs servent de fallback non-fonctionnel ; la fonctionnalité IA
  # locale est désactivée en production (cf. OllamaError dans le composant).
  VITE_OLLAMA_HOST = "http://localhost:11434"
  VITE_OLLAMA_MODEL = "mistral"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://nexora-truck.fr https://rnbbxmdughpxovcnhrpz.supabase.co https://images.unsplash.com https://lh3.googleusercontent.com; connect-src 'self' https://rnbbxmdughpxovcnhrpz.supabase.co wss://rnbbxmdughpxovcnhrpz.supabase.co https://api.anthropic.com https://www.google-analytics.com https://www.googletagmanager.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site/screenshots/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/site/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://nexora-truck.fr"
    Access-Control-Allow-Methods = "GET, POST, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Authorization, Content-Type, X-Tenant-Key"

[[headers]]
  for = "/connexion-erp"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/connexion-erp/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/login"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/login/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/demo-access"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/session-picker"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/super-admin"
